name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check / Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # `rustup` is pre-installed on ubuntu-latest. `rustup show` reads
      # rust-toolchain.toml at the workspace root, installs the pinned
      # channel + components (rustfmt, clippy) if missing, and selects it.
      # Single source of truth — local devs and CI see the exact same
      # rustc + clippy versions, preventing lint-set drift (see issue #2
      # fixed 2026-05-21).
      - name: Install Rust toolchain from rust-toolchain.toml
        run: rustup show

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust-toolchain.toml', '**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

      - name: cargo test
        run: cargo test --workspace
