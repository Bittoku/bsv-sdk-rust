name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check / Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The toolchain version + components (rustfmt, clippy) are read from
      # rust-toolchain.toml at the workspace root. Pinning there keeps local
      # and CI on the same rustc/clippy so lint regressions don't slip
      # through (see issue #2 fixed 2026-05-21).
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust-toolchain.toml', '**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

      - name: cargo test
        run: cargo test --workspace
